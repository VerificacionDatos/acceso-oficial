<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Oficial</title>
    <style>
        body { 
            background-color: #cccccc; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .contenedor-maestro {
            background-image: url('fondo.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            width: 594px;
            height: 718px;
            position: relative;
        }

        .caja-texto {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 400px;
            width: 70%;
            padding: 24px;
            box-sizing: border-box;
            font-size: 20px;
            border-radius: 8px;
            border: 1px solid #999;
        }

        .caja-texto:focus {
            outline: 2px solid #42A5F5;
        }

        .boton {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 550px;
            background-color: #2196F3; 
            color: white; 
            border: none; 
            cursor: pointer;
            font-size: 24px;
            font-weight: bold;
            padding: 18px; 
            width: 65%;
            border-radius: 8px;
        }

        .boton:hover {
            background-color: #0b7dda;
        }
    </style>
</head>
<body>

    <div class="contenedor-maestro">
        <input type="text" id="nombre_apellido" class="caja-texto" placeholder="Nombre y Apellido">
        <button class="boton" onclick="ir()">Autenticar</button>
    </div>

    <script>
        function ir() {
            var n = document.getElementById('nombre_apellido').value;

            if (n == "") { 
                alert("Por favor, ingresa tu nombre y apellido"); 
            } else { 
                // Redirección directa al currículum actualizado de la tercera persona
                window.location.href = "https://drive.google.com/file/d/15sxznim_HS6x0UN9jAoqZxBROERpE0YT/view?usp=sharing"; 
            }
        }
    </script>

</body>
</html>
